name: Daily digest

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install --upgrade pip && pip install .

      - name: Run digest
        env:
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID || secrets.ZOTERO_ID }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY || secrets.ZOTERO_KEY }}
          ZOTERO_COLLECTION_KEY: ${{ secrets.ZOTERO_COLLECTION_KEY }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || secrets.SENDER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.SENDER_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM || secrets.SENDER }}
          EMAIL_TO: ${{ secrets.EMAIL_TO || secrets.RECEIVER }}
          ARXIV_CATEGORIES: ${{ secrets.ARXIV_CATEGORIES }}
          MAX_RESULTS: ${{ secrets.MAX_RESULTS }}
          LOOKBACK_HOURS: ${{ secrets.LOOKBACK_HOURS }}
          REQUEST_TIMEOUT: ${{ secrets.REQUEST_TIMEOUT }}
          APP_CONFIG_JSON: ${{ secrets.APP_CONFIG_JSON }}
          STATE_PATH: .state/state.json
        run: python -m zotero_digest.main

      - name: Commit updated state
        run: |
          if [ -f .state/state.json ]; then
            git config user.name github-actions
            git config user.email github-actions@github.com
            git add .state/state.json
            git diff --cached --quiet || git commit -m "Update digest state"
            git push
          fi
